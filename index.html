<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Draw Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="music-control" id="btn-musik" onclick="toggleMusik()">
        🎵 Musik: Off
    </button>

    <audio id="bg-music" loop>
        <source src="https://youtu.be/pRpeEdMmmQ0?si=4QLYwxASdQp9x4xy" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>🏆 TOURNAMENT DRAW SIMULATOR 🏆</h1>
        
        <div class="pot-container">
            <h3>Input Nama Peserta/Pemain:</h3>
            <div class="input-row">
                <input type="text" id="input-peserta" placeholder="Ketik nama lalu klik Tambah...">
                <button onclick="tambahPeserta()" class="btn-add">Tambah</button>
            </div>
            
            <h3>Daftar Peserta di Dalam Pot:</h3>
            <div id="pot-teams" class="pot-teams"></div>
        </div>

        <div class="stage-container">
            <div class="screen-title">LIVE SELECTION</div>
            <div id="draw-screen" class="draw-screen">
                <div class="placeholder-text">Masukkan nama di atas terlebih dahulu, lalu klik tombol di bawah...</div>
            </div>
        </div>

        <div class="control-panel">
            <button id="draw-btn" onclick="kocokSatuPeserta()" class="btn-main">🔮 KAMPANYE UNDIAN 🔮</button>
            <button id="reset-btn" onclick="resetDraw()" class="btn-reset">Reset</button>
        </div>

        <div class="table-container">
            <table class="result-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">No Urut</th>
                        <th style="width: 30%;">Bendera</th>
                        <th style="width: 50%;">Nama Peserta</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
