<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Draw Simulator - Custom Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="music-control" id="btn-musik" onclick="toggleMusik()">
        🎵 Musik: Off
    </button>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>🏆 TOURNAMENT DRAW SIMULATOR 🏆</h1>
        
        <div class="pot-container">
            <h3>Pilih Bendera & Input Nama Pemain:</h3>
            <div class="input-row" style="flex-wrap: wrap;">
                <select id="select-bendera">
                    <option value="id|Indonesia">🇮🇩 Indonesia</option>
                    <option value="ar|Argentina">🇦🇷 Argentina</option>
                    <option value="fr|Prancis">🇫🇷 Prancis</option>
                    <option value="br|Brasil">🇧🇷 Brasil</option>
                    <option value="jp|Jepang">🇯🇵 Jepang</option>
                    <option value="de|Jerman">🇩🇪 Jerman</option>
                    <option value="gb-eng|Inggris">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Inggris</option>
                    <option value="nl|Belanda">🇳🇱 Belanda</option>
                    <option value="ma|Maroko">🇲🇦 Maroko</option>
                    <option value="pt|Portugal">🇵🇹 Portugal</option>
                    <option value="es|Spanyol">🇪🇸 Spanyol</option>
                    <option value="sa|Arab Saudi">🇸🇦 Arab Saudi</option>
                    <option value="kr|Korea Selatan">🇰🇷 Korea Selatan</option>
                    <option value="hr|Kroasia">🇭🇷 Kroasia</option>
                    <option value="uy|Uruguay">🇺🇾 Uruguay</option>
                    <option value="sn|Senegal">🇸🇳 Senegal</option>
                </select>

                <input type="text" id="input-peserta" placeholder="Ketik nama pemain...">
                <button onclick="tambahPeserta()" class="btn-add">Tambah ke Pot</button>
            </div>
            
            <h3>Daftar Peserta Siap Diundi (Ada di Dalam Pot):</h3>
            <div id="pot-teams" class="pot-teams"></div>
        </div>

        <div class="stage-container">
            <div class="screen-title">LIVE SELECTION</div>
            <div id="draw-screen" class="draw-screen">
                <div class="placeholder-text">Masukkan pasangan nama & bendera di atas, lalu klik tombol di bawah...</div>
            </div>
        </div>

        <div class="control-panel">
            <button id="draw-btn" onclick="kocokSatuPeserta()" class="btn-main">🔮 KAMPANYE UNDIAN 🔮</button>
            <button id="reset-btn" onclick="resetDraw()" class="btn-reset">Reset</button>
        </div>

        <div class="table-container">
            <table class="result-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">No Urut</th>
                        <th style="width: 30%;">Bendera</th>
                        <th style="width: 50%;">Nama Peserta</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
